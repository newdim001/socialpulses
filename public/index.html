<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SocialPulses - Social Media Automation</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .gradient-text {
      background: linear-gradient(135deg, #ec4899 0%, #f43f5e 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
  </style>
</head>
<body class="bg-gray-50">
  <header class="bg-white shadow-sm">
    <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
      <h1 class="text-2xl font-bold gradient-text">SocialPulses</h1>
      <a href="#pricing" class="text-gray-600 hover:text-gray-900">Pricing</a>
    </div>
  </header>

  <section class="py-20 bg-white">
    <div class="max-w-4xl mx-auto px-4 text-center">
      <h2 class="text-5xl font-bold mb-6">
        Your Social Media, <span class="gradient-text">Automated</span>
      </h2>
      <p class="text-xl text-gray-600 mb-8">
        Schedule posts, track analytics, and grow your following - on autopilot.
      </p>
      <a href="#pricing" class="bg-gradient-to-r from-pink-500 to-rose-500 text-white px-8 py-4 rounded-lg font-semibold text-lg hover:opacity-90 transition">
        Get Started
      </a>
    </div>
  </section>

  <section id="pricing" class="py-20 bg-white">
    <div class="max-w-4xl mx-auto px-4">
      <div class="max-w-md mx-auto">
        <div class="bg-gradient-to-br from-pink-500 to-rose-500 rounded-2xl p-8 text-white text-center">
          <div class="text-6xl font-bold mb-2">$49</div>
          <div class="text-xl opacity-90 mb-2">/month</div>
          <div class="text-sm opacity-75 mb-8">Unlimited posts, 5 platforms</div>
          <button class="w-full bg-white text-pink-600 font-bold py-4 rounded-lg hover:bg-opacity-90 transition">
            Subscribe →
          </button>
        </div>
      </div>
    </div>
  </section>

  <footer class="bg-gray-900 text-white py-12 text-center">
    <p class="text-gray-400">© 2026 SocialPulses. All rights reserved.</p>
  </footer>
</body>
</html>
